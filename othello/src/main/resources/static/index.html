<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>オセロ</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: linear-gradient(135deg, #1a2a1a 0%, #0d1a0d 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', Arial, sans-serif;
    color: #e8f5e9;
    padding: 20px;
  }

  h1 {
    font-size: 2.2rem;
    letter-spacing: 8px;
    color: #a5d6a7;
    margin-bottom: 20px;
    text-shadow: 0 0 20px rgba(165,214,167,0.4);
  }

  .scoreboard {
    display: flex;
    gap: 30px;
    margin-bottom: 18px;
    align-items: center;
  }

  .score-card {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.07);
    border-radius: 12px;
    padding: 10px 22px;
    border: 2px solid transparent;
    transition: all 0.3s;
  }

  .score-card.active {
    border-color: #66bb6a;
    box-shadow: 0 0 15px rgba(102,187,106,0.3);
  }

  .score-disc {
    width: 26px; height: 26px;
    border-radius: 50%;
    box-shadow: inset 0 2px 4px rgba(255,255,255,0.3);
  }

  .score-disc.black { background: radial-gradient(circle at 35% 35%, #555, #000); }
  .score-disc.white { background: radial-gradient(circle at 35% 35%, #fff, #bbb); }

  .score-label { font-size: 0.85rem; color: #a5d6a7; }
  .score-num { font-size: 1.6rem; font-weight: bold; }

  .status {
    font-size: 1rem;
    color: #c8e6c9;
    margin-bottom: 14px;
    height: 24px;
    letter-spacing: 1px;
  }

  .board-wrap {
    background: rgba(0,0,0,0.3);
    border-radius: 16px;
    padding: 14px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(255,255,255,0.05);
  }

  #board {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 3px;
    background: #1b5e20;
    border: 3px solid #2e7d32;
    border-radius: 8px;
    padding: 3px;
  }

  .cell {
    width: 56px; height: 56px;
    background: #2e7d32;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
    transition: background 0.15s;
  }

  .cell:hover { background: #388e3c; }
  .cell.hint { background: #1b5e20; }
  .cell.hint::after {
    content: '';
    width: 16px; height: 16px;
    border-radius: 50%;
    background: rgba(255,255,255,0.18);
    border: 2px dashed rgba(255,255,255,0.35);
  }

  .disc {
    width: 46px; height: 46px;
    border-radius: 50%;
    position: absolute;
    transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
    transform-style: preserve-3d;
  }

  .disc.black {
    background: radial-gradient(circle at 35% 30%, #666, #111);
    box-shadow: 2px 3px 8px rgba(0,0,0,0.6), inset 0 1px 2px rgba(255,255,255,0.15);
  }

  .disc.white {
    background: radial-gradient(circle at 35% 30%, #fff, #ccc);
    box-shadow: 2px 3px 8px rgba(0,0,0,0.4), inset 0 1px 2px rgba(255,255,255,0.8);
  }

  .disc.flip { animation: flip 0.4s ease; }

  @keyframes flip {
    0%   { transform: rotateY(0deg); }
    50%  { transform: rotateY(90deg) scaleX(0.1); }
    100% { transform: rotateY(0deg); }
  }

  .disc.ai-placed { animation: place 0.3s ease; }

  @keyframes place {
    0%   { transform: scale(0) translateY(-10px); opacity: 0; }
    70%  { transform: scale(1.15); }
    100% { transform: scale(1); opacity: 1; }
  }

  .controls {
    display: flex;
    gap: 12px;
    margin-top: 18px;
    align-items: center;
  }

  button {
    background: #2e7d32;
    color: #e8f5e9;
    border: none;
    border-radius: 8px;
    padding: 10px 24px;
    font-size: 0.95rem;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
    border: 1px solid #43a047;
  }

  button:hover { background: #388e3c; transform: translateY(-1px); }
  button:active { transform: translateY(0); }

  .hint-toggle {
    background: transparent;
    border-color: #558b2f;
    color: #a5d6a7;
  }

  .hint-toggle.on { background: #33691e; border-color: #8bc34a; }

  .overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    align-items: center;
    justify-content: center;
    z-index: 100;
  }

  .overlay.show { display: flex; }

  .dialog {
    background: linear-gradient(135deg, #1b5e20, #2e7d32);
    border-radius: 20px;
    padding: 40px 50px;
    text-align: center;
    border: 2px solid #66bb6a;
    box-shadow: 0 20px 60px rgba(0,0,0,0.8);
    animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  @keyframes popIn {
    from { transform: scale(0.5); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }

  .dialog h2 { font-size: 1.8rem; margin-bottom: 10px; color: #a5d6a7; }
  .dialog p  { font-size: 1.1rem; margin-bottom: 24px; color: #c8e6c9; }

  .coords {
    display: flex;
    gap: 3px;
    justify-content: center;
    margin-bottom: 4px;
  }

  .coord-label {
    width: 56px; height: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.65rem;
    color: #4caf50;
  }

  @media (max-width: 520px) {
    .cell { width: 40px; height: 40px; }
    .disc { width: 33px; height: 33px; }
    .coord-label { width: 40px; }
    h1 { font-size: 1.5rem; }
  }
</style>
</head>
<body>

<h1>⚫ オセロ ⚪</h1>

<div class="scoreboard">
  <div class="score-card" id="black-card">
    <div class="score-disc black"></div>
    <div>
      <div class="score-label">あなた (黒)</div>
      <div class="score-num" id="black-score">2</div>
    </div>
  </div>
  <div class="score-card" id="white-card">
    <div class="score-disc white"></div>
    <div>
      <div class="score-label">AI (白)</div>
      <div class="score-num" id="white-score">2</div>
    </div>
  </div>
</div>

<div class="status" id="status">あなたの番です</div>

<div class="board-wrap">
  <div class="coords" id="col-labels"></div>
  <div id="board"></div>
</div>

<div class="controls">
  <button onclick="newGame()">🔄 新しいゲーム</button>
  <button class="hint-toggle" id="hint-btn" onclick="toggleHints()">💡 ヒント: OFF</button>
</div>

<div class="overlay" id="overlay">
  <div class="dialog">
    <h2 id="result-title"></h2>
    <p id="result-msg"></p>
    <button onclick="newGame()">もう一度</button>
  </div>
</div>

<script>
const BLACK = 1, WHITE = 2;
let state = null;
let showHints = false;
let thinking = false;

async function fetchState() {
  const res = await fetch('/api/state');
  state = await res.json();
  render();
}

async function newGame() {
  document.getElementById('overlay').classList.remove('show');
  thinking = false;
  const res = await fetch('/api/new', { method: 'POST' });
  state = await res.json();
  render();
}

async function makeMove(row, col) {
  if (thinking || !state || state.gameOver || state.currentPlayer !== BLACK) return;
  thinking = true;
  setStatus('AIが考え中…');

  const res = await fetch('/api/move', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ row, col })
  });
  const data = await res.json();

  if (!data.moved) {
    thinking = false;
    setStatus('そこには置けません');
    setTimeout(() => render(), 800);
    return;
  }

  state = data;
  render();

  if (data.aiRow >= 0) {
    const aiCell = document.querySelector(`[data-r="${data.aiRow}"][data-c="${data.aiCol}"]`);
    if (aiCell) {
      const disc = aiCell.querySelector('.disc');
      if (disc) disc.classList.add('ai-placed');
    }
  }

  thinking = false;

  if (state.gameOver) showResult();
  else render();
}

function render() {
  if (!state) return;
  updateScores();
  renderBoard();
  if (!state.gameOver) {
    const player = state.currentPlayer;
    setStatus(player === BLACK ? 'あなたの番です (黒)' : 'AIの番 (白)');
    updateActiveCard(player);
  }
}

function renderBoard() {
  const boardEl = document.getElementById('board');
  boardEl.innerHTML = '';

  const validSet = new Set();
  if (state.validMoves && state.currentPlayer === BLACK) {
    state.validMoves.forEach(m => validSet.add(`${m[0]},${m[1]}`));
  }

  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.r = r; cell.dataset.c = c;

      const val = state.board[r][c];
      if (val === BLACK || val === WHITE) {
        const disc = document.createElement('div');
        disc.className = 'disc ' + (val === BLACK ? 'black' : 'white');
        cell.appendChild(disc);
      } else if (showHints && validSet.has(`${r},${c}`)) {
        cell.classList.add('hint');
      }

      cell.addEventListener('click', () => makeMove(r, c));
      boardEl.appendChild(cell);
    }
  }
}

function updateScores() {
  document.getElementById('black-score').textContent = state.blackScore;
  document.getElementById('white-score').textContent = state.whiteScore;
}

function updateActiveCard(player) {
  document.getElementById('black-card').classList.toggle('active', player === BLACK);
  document.getElementById('white-card').classList.toggle('active', player === WHITE);
}

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

function toggleHints() {
  showHints = !showHints;
  const btn = document.getElementById('hint-btn');
  btn.textContent = `💡 ヒント: ${showHints ? 'ON' : 'OFF'}`;
  btn.classList.toggle('on', showHints);
  render();
}

function showResult() {
  const w = state.winner;
  const title = w === 'draw' ? '引き分け！' : w === 'black' ? 'あなたの勝ち！🎉' : 'AIの勝ち！🤖';
  const msg = `最終スコア: 黒 ${state.blackScore} - 白 ${state.whiteScore}`;
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-msg').textContent = msg;
  document.getElementById('overlay').classList.add('show');
}

// Column labels
const labels = document.getElementById('col-labels');
['', 'A','B','C','D','E','F','G','H'].forEach(l => {
  const d = document.createElement('div');
  d.className = 'coord-label';
  d.textContent = l;
  labels.appendChild(d);
});

fetchState();
</script>
</body>
</html>
