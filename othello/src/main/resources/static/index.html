<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>オセロ</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --green-dark: #1b5e20;
  --green-mid: #2e7d32;
  --green-light: #388e3c;
  --accent: #66bb6a;
  --text: #e8f5e9;
  --text-dim: #a5d6a7;
  --bg: #0d1a0d;
  --card-bg: rgba(255,255,255,0.06);
}

body {
  background: radial-gradient(ellipse at top, #1a2e1a 0%, var(--bg) 70%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  font-family: 'Segoe UI', Arial, sans-serif;
  color: var(--text);
  padding: 16px;
  overflow-x: hidden;
}

.title {
  font-size: 2rem;
  letter-spacing: 10px;
  color: var(--accent);
  margin-bottom: 4px;
  text-shadow: 0 0 30px rgba(102,187,106,0.5);
}

.tabs {
  display: flex;
  gap: 4px;
  margin: 12px 0;
  background: rgba(0,0,0,0.3);
  border-radius: 10px;
  padding: 4px;
}
.tab {
  padding: 7px 20px;
  border-radius: 7px;
  cursor: pointer;
  font-size: 0.85rem;
  color: var(--text-dim);
  transition: all 0.2s;
  border: none;
  background: transparent;
}
.tab.active {
  background: var(--green-mid);
  color: var(--text);
  box-shadow: 0 2px 8px rgba(0,0,0,0.4);
}

.screen { display: none; flex-direction: column; align-items: center; width: 100%; }
.screen.active { display: flex; }

/* ===== START SCREEN ===== */
.start-card {
  background: var(--card-bg);
  border: 1px solid rgba(102,187,106,0.2);
  border-radius: 16px;
  padding: 28px 32px;
  width: 340px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.start-card h2 { color: var(--accent); font-size: 1rem; margin-bottom: 4px; }

.name-input {
  width: 100%;
  padding: 10px 14px;
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(102,187,106,0.3);
  border-radius: 8px;
  color: var(--text);
  font-size: 0.95rem;
  outline: none;
}
.name-input:focus { border-color: var(--accent); }

.mode-select { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.mode-btn {
  padding: 12px 8px;
  border-radius: 10px;
  border: 2px solid rgba(102,187,106,0.2);
  background: rgba(0,0,0,0.2);
  color: var(--text-dim);
  cursor: pointer;
  text-align: center;
  transition: all 0.2s;
  font-size: 0.85rem;
}
.mode-btn .icon { font-size: 1.4rem; display: block; margin-bottom: 4px; }
.mode-btn.selected { border-color: var(--accent); background: rgba(102,187,106,0.15); color: var(--text); }

.diff-select { display: flex; gap: 6px; }
.diff-btn {
  flex: 1;
  padding: 8px 4px;
  border-radius: 8px;
  border: 2px solid rgba(102,187,106,0.2);
  background: rgba(0,0,0,0.2);
  color: var(--text-dim);
  cursor: pointer;
  font-size: 0.8rem;
  transition: all 0.2s;
}
.diff-btn.easy.selected   { border-color: #81c784; background: rgba(129,199,132,0.15); color: var(--text); }
.diff-btn.normal.selected { border-color: #ffb74d; background: rgba(255,183,77,0.12);  color: var(--text); }
.diff-btn.hard.selected   { border-color: #ef5350; background: rgba(239,83,80,0.12);   color: var(--text); }

.start-btn {
  padding: 14px;
  background: linear-gradient(135deg, var(--green-mid), var(--green-light));
  border: none;
  border-radius: 10px;
  color: var(--text);
  font-size: 1rem;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.2s;
  font-weight: bold;
}
.start-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.4); }

/* ===== GAME SCREEN ===== */
.scoreboard {
  display: flex;
  gap: 16px;
  margin-bottom: 12px;
  align-items: center;
}
.score-card {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--card-bg);
  border-radius: 12px;
  padding: 8px 18px;
  border: 2px solid transparent;
  transition: all 0.3s;
  min-width: 120px;
}
.score-card.active { border-color: var(--accent); box-shadow: 0 0 16px rgba(102,187,106,0.3); }
.score-disc { width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0; }
.score-disc.black { background: radial-gradient(circle at 35% 35%, #666, #111); box-shadow: inset 0 1px 3px rgba(255,255,255,0.2); }
.score-disc.white { background: radial-gradient(circle at 35% 35%, #fff, #ccc); box-shadow: inset 0 1px 3px rgba(255,255,255,0.8); }
.score-info { flex: 1; }
.score-name { font-size: 0.7rem; color: var(--text-dim); }
.score-num  { font-size: 1.5rem; font-weight: bold; line-height: 1; }

.vs-badge {
  font-size: 0.8rem;
  color: var(--text-dim);
  background: rgba(0,0,0,0.3);
  padding: 4px 10px;
  border-radius: 20px;
}

.status-bar {
  font-size: 0.9rem;
  color: var(--text-dim);
  margin-bottom: 10px;
  height: 22px;
  letter-spacing: 0.5px;
}

.board-wrap {
  background: rgba(0,0,0,0.25);
  border-radius: 14px;
  padding: 12px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.04);
}

#board {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  gap: 2px;
  background: #174d1a;
  border: 2px solid #2e7d32;
  border-radius: 6px;
  padding: 2px;
}

.cell {
  width: 54px; height: 54px;
  background: var(--green-mid);
  border-radius: 3px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  position: relative;
  transition: background 0.12s;
}
.cell:hover { background: var(--green-light); }
.cell.last-move { background: #33691e; }
.cell.hint::after {
  content: '';
  width: 14px; height: 14px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  border: 2px dashed rgba(255,255,255,0.3);
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { opacity: 0.5; transform: scale(0.9); }
  50%      { opacity: 1;   transform: scale(1.1); }
}

.disc {
  width: 44px; height: 44px;
  border-radius: 50%;
  position: absolute;
}
.disc.black {
  background: radial-gradient(circle at 35% 30%, #555, #111);
  box-shadow: 2px 3px 8px rgba(0,0,0,0.7), inset 0 1px 2px rgba(255,255,255,0.12);
}
.disc.white {
  background: radial-gradient(circle at 35% 30%, #fff, #ccc);
  box-shadow: 2px 3px 8px rgba(0,0,0,0.35), inset 0 1px 3px rgba(255,255,255,0.9);
}

.disc.flip-to-black { animation: flipToBlack 0.45s ease forwards; }
.disc.flip-to-white { animation: flipToWhite 0.45s ease forwards; }
@keyframes flipToBlack {
  0%  { transform: rotateY(0deg);  background: radial-gradient(circle at 35% 30%, #fff, #ccc); }
  49% { transform: rotateY(90deg); background: radial-gradient(circle at 35% 30%, #fff, #ccc); }
  50% { transform: rotateY(90deg); background: radial-gradient(circle at 35% 30%, #555, #111); }
  100%{ transform: rotateY(0deg);  background: radial-gradient(circle at 35% 30%, #555, #111); }
}
@keyframes flipToWhite {
  0%  { transform: rotateY(0deg);  background: radial-gradient(circle at 35% 30%, #555, #111); }
  49% { transform: rotateY(90deg); background: radial-gradient(circle at 35% 30%, #555, #111); }
  50% { transform: rotateY(90deg); background: radial-gradient(circle at 35% 30%, #fff, #ccc); }
  100%{ transform: rotateY(0deg);  background: radial-gradient(circle at 35% 30%, #fff, #ccc); }
}
.disc.place {
  animation: placeDisc 0.3s cubic-bezier(0.175,0.885,0.32,1.275) forwards;
}
@keyframes placeDisc {
  0%  { transform: scale(0) translateY(-8px); opacity: 0; }
  70% { transform: scale(1.15); }
  100%{ transform: scale(1); opacity: 1; }
}

.controls {
  display: flex;
  gap: 8px;
  margin-top: 14px;
  flex-wrap: wrap;
  justify-content: center;
}
.btn {
  background: var(--green-mid);
  color: var(--text);
  border: 1px solid rgba(102,187,106,0.4);
  border-radius: 8px;
  padding: 8px 16px;
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.15s;
}
.btn:hover { background: var(--green-light); transform: translateY(-1px); }
.btn.outline { background: transparent; color: var(--text-dim); }
.btn.outline.on { background: rgba(102,187,106,0.15); color: var(--text); }

/* ===== RANKING SCREEN ===== */
.ranking-wrap { width: 100%; max-width: 440px; }
.ranking-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.ranking-title { color: var(--accent); font-size: 1.1rem; letter-spacing: 3px; }
.rank-table { width: 100%; border-collapse: collapse; }
.rank-table th {
  text-align: left;
  padding: 8px 12px;
  font-size: 0.75rem;
  color: var(--text-dim);
  border-bottom: 1px solid rgba(102,187,106,0.2);
}
.rank-table td {
  padding: 10px 12px;
  font-size: 0.9rem;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.diff-tag {
  font-size: 0.7rem;
  padding: 2px 6px;
  border-radius: 10px;
  background: rgba(255,255,255,0.08);
}
.diff-tag.EASY   { color: #81c784; }
.diff-tag.NORMAL { color: #ffb74d; }
.diff-tag.HARD   { color: #ef5350; }
.empty-rank { text-align: center; color: var(--text-dim); padding: 40px; font-size: 0.9rem; }
.rank-note  { text-align: center; color: rgba(165,214,167,0.4); font-size: 0.72rem; margin-top: 12px; }

/* ===== RESULT OVERLAY ===== */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.8);
  align-items: center; justify-content: center;
  z-index: 100;
}
.overlay.show { display: flex; }
.dialog {
  background: linear-gradient(135deg, #1b5e20, #2e7d32);
  border-radius: 20px;
  padding: 36px 44px;
  text-align: center;
  border: 2px solid var(--accent);
  box-shadow: 0 20px 60px rgba(0,0,0,0.8);
  animation: popIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
}
@keyframes popIn {
  from { transform: scale(0.5); opacity: 0; }
  to   { transform: scale(1);   opacity: 1; }
}
.dialog-emoji { font-size: 3rem; margin-bottom: 8px; }
.dialog h2 { font-size: 1.6rem; margin-bottom: 8px; color: var(--accent); }
.dialog p  { color: #c8e6c9; margin-bottom: 20px; }
.dialog-btns { display: flex; gap: 10px; justify-content: center; }

@media (max-width: 500px) {
  .cell { width: 40px; height: 40px; }
  .disc { width: 33px; height: 33px; }
  .title { font-size: 1.5rem; }
  .start-card { width: 100%; padding: 20px; }
}
</style>
</head>
<body>

<div class="title">⚫ オセロ ⚪</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('game', this)">🎮 ゲーム</button>
  <button class="tab" onclick="switchTab('ranking', this)">🏆 ランキング</button>
</div>

<!-- ===== GAME SCREEN ===== -->
<div class="screen active" id="screen-game">

  <!-- START -->
  <div id="view-start">
    <div class="start-card">
      <div>
        <h2>プレイヤー名</h2>
        <input class="name-input" id="player-name" type="text" placeholder="名前を入力" maxlength="12" value="Player">
      </div>

      <div>
        <h2>モード</h2>
        <div class="mode-select">
          <div class="mode-btn selected" id="mode-ai" onclick="selectMode('ai')">
            <span class="icon">🤖</span>AI対戦
          </div>
          <div class="mode-btn" id="mode-2p" onclick="selectMode('2p')">
            <span class="icon">👥</span>2人対戦
          </div>
        </div>
      </div>

      <div id="diff-section">
        <h2>難易度</h2>
        <div class="diff-select">
          <button class="diff-btn easy"          onclick="selectDiff('EASY')">😊 かんたん</button>
          <button class="diff-btn normal selected" onclick="selectDiff('NORMAL')">😐 ふつう</button>
          <button class="diff-btn hard"           onclick="selectDiff('HARD')">😈 むずかしい</button>
        </div>
      </div>

      <button class="start-btn" onclick="startGame()">▶ ゲームスタート</button>
    </div>
  </div>

  <!-- PLAY -->
  <div id="view-play" style="display:none; flex-direction:column; align-items:center;">
    <div class="scoreboard">
      <div class="score-card" id="black-card">
        <div class="score-disc black"></div>
        <div class="score-info">
          <div class="score-name" id="black-name">あなた (黒)</div>
          <div class="score-num" id="black-score">2</div>
        </div>
      </div>
      <div class="vs-badge" id="vs-badge">VS AI</div>
      <div class="score-card" id="white-card">
        <div class="score-disc white"></div>
        <div class="score-info">
          <div class="score-name" id="white-name">AI (白)</div>
          <div class="score-num" id="white-score">2</div>
        </div>
      </div>
    </div>

    <div class="status-bar" id="status">あなたの番です</div>

    <div class="board-wrap">
      <div id="board"></div>
    </div>

    <div class="controls">
      <button class="btn" onclick="backToStart()">🏠 メニュー</button>
      <button class="btn" onclick="replayGame()">🔄 もう一度</button>
      <button class="btn outline" id="hint-btn" onclick="toggleHints()">💡 ヒント: OFF</button>
    </div>
  </div>
</div>

<!-- ===== RANKING SCREEN ===== -->
<div class="screen" id="screen-ranking">
  <div class="ranking-wrap">
    <div class="ranking-header">
      <div class="ranking-title">🏆 RANKING TOP 10</div>
      <button class="btn outline" style="font-size:0.75rem;padding:5px 10px" onclick="clearRanking()">🗑 クリア</button>
    </div>
    <table class="rank-table">
      <thead>
        <tr>
          <th>#</th><th>名前</th><th>スコア</th><th>難易度</th><th>日時</th>
        </tr>
      </thead>
      <tbody id="rank-body"></tbody>
    </table>
    <div id="rank-empty" class="empty-rank" style="display:none">
      まだ記録がありません。<br>AI対戦に勝利すると登録されます！
    </div>
    <div class="rank-note">※ サーバー再起動時にリセットされる場合があります</div>
  </div>
</div>

<!-- Result overlay -->
<div class="overlay" id="overlay">
  <div class="dialog">
    <div class="dialog-emoji" id="result-emoji"></div>
    <h2 id="result-title"></h2>
    <p id="result-msg"></p>
    <div class="dialog-btns">
      <button class="btn" onclick="backToStart()">🏠 メニュー</button>
      <button class="btn" onclick="replayGame()">🔄 もう一度</button>
    </div>
  </div>
</div>

<script>
const BLACK = 1, WHITE = 2;
let state = null;
let showHints = false;
let thinking = false;
let prevBoard = null;
let selectedMode = 'ai';
let selectedDiff = 'NORMAL';
let currentGameConfig = {};

// ===== TAB =====
function switchTab(tab, el) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('screen-' + tab).classList.add('active');
  el.classList.add('active');
  if (tab === 'ranking') loadRanking();
}

// ===== START =====
function selectMode(mode) {
  selectedMode = mode;
  document.getElementById('mode-ai').classList.toggle('selected', mode === 'ai');
  document.getElementById('mode-2p').classList.toggle('selected', mode === '2p');
  document.getElementById('diff-section').style.display = mode === 'ai' ? '' : 'none';
}

function selectDiff(diff) {
  selectedDiff = diff;
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('selected'));
  document.querySelector('.diff-btn.' + diff.toLowerCase()).classList.add('selected');
}

async function startGame() {
  const name = document.getElementById('player-name').value.trim() || 'Player';
  await fetch('/api/name', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name })
  });

  currentGameConfig = {
    mode: selectedMode === '2p' ? 'vs_human' : 'vs_ai',
    difficulty: selectedDiff,
  };

  const res = await fetch('/api/new', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(currentGameConfig)
  });
  state = await res.json();
  prevBoard = null;

  document.getElementById('black-name').textContent = name + ' (黒)';
  document.getElementById('white-name').textContent = selectedMode === '2p' ? 'Player2 (白)' : 'AI (白)';
  document.getElementById('vs-badge').textContent = selectedMode === '2p' ? '2P'
    : { EASY:'かんたん', NORMAL:'ふつう', HARD:'むずかしい' }[selectedDiff];

  document.getElementById('view-start').style.display = 'none';
  document.getElementById('view-play').style.display = 'flex';
  render();
}

function backToStart() {
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('view-play').style.display = 'none';
  document.getElementById('view-start').style.display = '';
  state = null; prevBoard = null; thinking = false;
}

async function replayGame() {
  document.getElementById('overlay').classList.remove('show');
  const res = await fetch('/api/new', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(currentGameConfig)
  });
  state = await res.json();
  prevBoard = null; thinking = false;
  render();
}

// ===== MOVE =====
async function makeMove(row, col) {
  if (thinking || !state || state.gameOver) return;
  if (!state.validMoves || !state.validMoves.some(m => m[0] === row && m[1] === col)) return;

  thinking = true;
  const boardBefore = state.board.map(r => [...r]);

  const res = await fetch('/api/move', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ row, col })
  });
  const data = await res.json();

  if (!data.moved) { thinking = false; return; }

  // ★ state を先に更新してからrenderBoard（ヒントバグ修正）
  state = data;
  renderBoard(data.board, row, col, data.aiRow ?? -1, data.aiCol ?? -1, boardBefore);
  updateScores();
  updateStatus();

  thinking = false;
  if (state.gameOver) setTimeout(showResult, 700);
}

// ===== RENDER =====
function render() {
  if (!state) return;
  renderBoard(state.board, -1, -1, -1, -1, prevBoard);
  updateScores();
  updateStatus();
}

function renderBoard(board, placedRow, placedCol, aiRow, aiCol, oldBoard) {
  const boardEl = document.getElementById('board');
  boardEl.innerHTML = '';

  // ★ ヒントは state.validMoves を使う（stateは常に最新）
  const validSet = new Set((state?.validMoves || []).map(m => `${m[0]},${m[1]}`));

  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';

      const isPlaced = (r === placedRow && c === placedCol) || (r === aiRow && c === aiCol);
      if (isPlaced) cell.classList.add('last-move');

      const val = board[r][c];
      if (val !== 0) {
        const disc = document.createElement('div');
        disc.className = 'disc ' + (val === BLACK ? 'black' : 'white');

        if (isPlaced) {
          disc.classList.add('place');
        } else if (oldBoard && oldBoard[r][c] !== 0 && oldBoard[r][c] !== val) {
          disc.classList.add(val === BLACK ? 'flip-to-black' : 'flip-to-white');
        }
        cell.appendChild(disc);
      } else if (showHints && validSet.has(`${r},${c}`)) {
        cell.classList.add('hint');
      }

      cell.addEventListener('click', () => makeMove(r, c));
      boardEl.appendChild(cell);
    }
  }
  prevBoard = board.map(row => [...row]);
}

function updateScores() {
  if (!state) return;
  document.getElementById('black-score').textContent = state.blackScore;
  document.getElementById('white-score').textContent = state.whiteScore;
  document.getElementById('black-card').classList.toggle('active', state.currentPlayer === BLACK);
  document.getElementById('white-card').classList.toggle('active', state.currentPlayer === WHITE);
}

function updateStatus() {
  if (!state || state.gameOver) return;
  if (state.currentPlayer === BLACK) {
    setStatus('⚫ あなたの番です');
  } else if (state.mode === 'VS_AI') {
    setStatus('🤖 AIが考え中…');
  } else {
    setStatus('⚪ 白の番です');
  }
}

function setStatus(msg) { document.getElementById('status').textContent = msg; }

function toggleHints() {
  showHints = !showHints;
  const btn = document.getElementById('hint-btn');
  btn.textContent = `💡 ヒント: ${showHints ? 'ON' : 'OFF'}`;
  btn.classList.toggle('on', showHints);
  render();
}

function showResult() {
  const w = state.winner;
  const isVsAI = state.mode === 'VS_AI';
  const emoji = w === 'draw' ? '🤝' : w === 'black' ? (isVsAI ? '🎉' : '⚫') : (isVsAI ? '🤖' : '⚪');
  const title = w === 'draw' ? '引き分け！' : w === 'black' ? (isVsAI ? 'あなたの勝ち！' : '黒の勝ち！') : (isVsAI ? 'AIの勝ち…' : '白の勝ち！');
  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-msg').textContent = `最終スコア: 黒 ${state.blackScore} - 白 ${state.whiteScore}`;
  document.getElementById('overlay').classList.add('show');
}

// ===== RANKING =====
async function loadRanking() {
  const res = await fetch('/api/ranking');
  const data = await res.json();
  const tbody = document.getElementById('rank-body');
  const empty = document.getElementById('rank-empty');
  tbody.innerHTML = '';

  if (!data.ranking || data.ranking.length === 0) {
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';
  const medals = ['🥇','🥈','🥉'];
  const diffLabel = { EASY:'かんたん', NORMAL:'ふつう', HARD:'むずかしい' };

  data.ranking.forEach((entry, i) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${medals[i] || i+1}</td>
      <td>${entry.name}</td>
      <td><strong>${entry.score}</strong></td>
      <td><span class="diff-tag ${entry.difficulty}">${diffLabel[entry.difficulty] || entry.difficulty}</span></td>
      <td style="font-size:0.75rem;color:var(--text-dim)">${entry.date}</td>
    `;
    tbody.appendChild(tr);
  });
}

async function clearRanking() {
  if (!confirm('ランキングをすべて削除しますか？')) return;
  await fetch('/api/ranking', { method: 'DELETE' });
  loadRanking();
}

fetch('/api/state').then(r => r.json()).then(s => { state = s; });
</script>
